<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bootstrap</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h1 class="text-center mt-4">Mi página con Bootstrap</h1>

<!-- BOTON -->
<button class="btn btn-primary">Botón de ejemplo</button>

<hr>

<!-- TARJETA -->
<div class="card" style="width: 18rem;">
  <img src="https://via.placeholder.com/300" class="card-img-top">
  <div class="card-body">
    <h5 class="card-title">Tarjeta</h5>
    <p class="card-text">Ejemplo de componente Bootstrap.</p>
    <a href="#" class="btn btn-success">Ir</a>
  </div>
</div>

<hr>

<!-- FORMULARIO -->
<form>
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input type="email" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">Contraseña</label>
    <input type="password" class="form-control">
  </div>

  <button class="btn btn-danger">Enviar</button>
</form>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
